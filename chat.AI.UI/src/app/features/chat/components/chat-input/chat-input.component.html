<div class="chat-input">
  <textarea
    class="chat-input__textarea"
    rows="1"
    placeholder="Escribí tu mensaje… (Enter para enviar)"
    [value]="text"
    [disabled]="disabled()"
    (input)="onInput($event)"
    (keydown)="onKeydown($event)"
  ></textarea>
  <button
    class="btn btn--primary chat-input__send"
    [disabled]="disabled() || !text.trim()"
    (click)="submit()"
  >
    Enviar
  </button>
</div>
